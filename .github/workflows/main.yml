name: Build Plugin

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build with Maven
        working-directory: PixelForge Plugin 3.0/PixelForge
        run: mvn -B clean package

      - uses: actions/upload-artifact@v4
        with:
          name: StrengthLifesteal-jar
          path: PixelForge Plugin 3.0/PixelForge/target/StrengthLifesteal.jar
